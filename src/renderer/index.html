<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' file: data:; media-src 'self' file:;">
  <title>Star Launcher</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/glass.css">
</head>
<body>
  <div id="app">
    <!-- 左侧图标栏 -->
    <aside id="sidebar">
      <div id="game-list"></div>
      <div id="sidebar-divider"></div>
      <button id="add-game-btn" title="添加游戏">+</button>
      <button id="settings-btn" title="游戏管理">⚙</button>
    </aside>

    <!-- 右侧封面区 -->
    <main id="main-content">
      <!-- 标题栏 -->
      <div id="title-bar">
        <button class="title-btn" id="btn-minimize" title="最小化"><svg width="10" height="10" viewBox="0 0 10 10"><rect y="4" width="10" height="1" fill="currentColor"/></svg></button>
        <button class="title-btn" id="btn-maximize" title="最大化"><svg width="10" height="10" viewBox="0 0 10 10"><rect x="0.5" y="0.5" width="9" height="9" fill="none" stroke="currentColor" stroke-width="1"/></svg></button>
        <button class="title-btn title-btn-close" id="btn-close" title="关闭"><svg width="10" height="10" viewBox="0 0 10 10"><line x1="0" y1="0" x2="10" y2="10" stroke="currentColor" stroke-width="1.2"/><line x1="10" y1="0" x2="0" y2="10" stroke="currentColor" stroke-width="1.2"/></svg></button>
      </div>

      <!-- 封面背景 -->
      <div id="cover-area">
        <!-- 左右切换箭头 -->
        <button id="media-arrow-left" class="media-arrow" title="上一个">◀</button>
        <button id="media-arrow-right" class="media-arrow" title="下一个">▶</button>
        <div id="game-info">
          <div id="game-name"></div>
          <div id="game-last-played"></div>
        </div>
        <!-- 更新面板 -->
        <div id="update-panel">
          <div id="update-title"></div>
          <div id="update-body"></div>
          <div id="update-progress-bar"></div>
          <div id="update-actions"></div>
        </div>
        <button id="launch-btn">▶ 启动游戏</button>
        <div id="empty-state">
          <div style="font-size:48px;margin-bottom:12px;">🎮</div>
          <div>还没有游戏</div>
          <div style="font-size:13px;margin-top:6px;opacity:0.6;">点击左侧 + 添加</div>
        </div>
      </div>
      <!-- 设置面板遮罩层 -->
      <div id="settings-overlay" style="display:none;"></div>
      <div id="settings-panel" style="display:none;">
        <div id="settings-header">
          <span>⚙ 游戏管理</span>
          <button id="settings-close-btn" title="关闭">✕</button>
        </div>
        <div id="settings-global"></div>
        <div id="settings-game-list"></div>
      </div>
    </main>
  </div>

  <script src="js/util.js"></script>
  <script src="js/library.js"></script>
  <script src="js/detail.js"></script>
  <script src="js/add-game.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/update-panel.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
